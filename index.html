<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isara Ekanayake — Software Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ff6a00;
    --orange-dim: #cc5500;
    --orange-glow: rgba(255, 106, 0, 0.35);
    --orange-soft: rgba(255, 106, 0, 0.12);
    --bg: #030305;
    --card: #0a0a0f;
    --card2: #101018;
    --border: rgba(255,255,255,0.08);
    --border-orange: rgba(255,106,0,0.25);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.65);
    --text-mute: rgba(255,255,255,0.4);
    --font-head: 'Space Grotesk', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: hidden; }
  .lenis.lenis-scrolling iframe { pointer-events: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ─────────────────────── */
  .cursor {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    width: 8px; height: 8px; background: white; border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width .2s, height .2s;
  }
  .cursor-ring {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998;
    width: 40px; height: 40px;
    border: 1.5px solid rgba(255,85,0,0.7);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: all .12s ease;
  }
  body:hover .cursor-ring.hovering { width: 60px; height: 60px; border-color: var(--orange); }

  /* ── NOISE OVERLAY ─────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  /* ── NAVBAR ────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 48px;
    height: 68px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(18px) saturate(1.4);
    background: rgba(8,8,8,0.75);
    transition: background .3s;
  }
  .nav-logo {
    font-family: var(--font-head);
    font-weight: 800; font-size: 1.15rem;
    letter-spacing: -0.02em;
    color: var(--text);
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 800;
    color: white;
    box-shadow: 0 0 20px var(--orange-glow);
  }
  .nav-links {
    display: flex; align-items: center; gap: 36px;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.875rem; font-weight: 400; letter-spacing: 0.01em;
    color: var(--text-dim); text-decoration: none;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--orange);
    color: white !important;
    padding: 9px 22px;
    border-radius: 8px;
    font-weight: 500 !important;
    font-size: 0.875rem !important;
    transition: background .2s, box-shadow .2s !important;
    box-shadow: 0 0 24px rgba(255,85,0,0.3);
  }
  .nav-cta:hover { background: #ff6a1a !important; box-shadow: 0 0 36px rgba(255,85,0,0.5) !important; color: white !important; }

  .nav-mobile-btn { display: none; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }

  /* ── SECTIONS ──────────────────────────── */
  section { position: relative; z-index: 2; }

  /* ── HERO ──────────────────────────────── */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center;
    padding: 120px 24px 80px;
    position: relative; overflow: hidden;
  }
  #hero-canvas {
    position: absolute; inset: 0; z-index: 0;
  }
  .hero-glow {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 55%, rgba(255,85,0,0.18) 0%, transparent 70%);
  }
  .hero-glow-edge {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 100% 30% at 50% 0%, rgba(255,85,0,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 100% 30% at 50% 100%, rgba(255,85,0,0.1) 0%, transparent 60%);
  }
  .hero-content { position: relative; z-index: 5; max-width: 860px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,85,0,0.1);
    border: 1px solid rgba(255,85,0,0.3);
    padding: 6px 16px; border-radius: 100px;
    font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 32px;
    opacity: 0; transform: translateY(20px);
  }
  .hero-badge .dot { width: 6px; height: 6px; background: var(--orange); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.8)} }
  .hero-name {
    font-family: var(--font-head);
    font-size: clamp(3.2rem, 8vw, 7.5rem);
    font-weight: 800; line-height: 0.95;
    letter-spacing: -0.04em;
    margin-bottom: 18px;
    opacity: 0; transform: translateY(30px);
  }
  .hero-name .accent { color: var(--orange); }
  .hero-title {
    font-family: var(--font-head);
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 500; color: var(--text-dim); letter-spacing: 0.02em;
    margin-bottom: 24px;
    opacity: 0; transform: translateY(20px);
  }
  .hero-desc {
    font-size: 1rem; line-height: 1.75; color: var(--text-dim);
    max-width: 520px; margin: 0 auto 44px;
    opacity: 0; transform: translateY(20px);
  }
  .hero-btns {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    opacity: 0; transform: translateY(20px);
  }
  .btn-primary {
    background: var(--orange); color: white;
    padding: 14px 32px; border-radius: 10px;
    font-family: var(--font-body); font-size: 0.925rem; font-weight: 500;
    text-decoration: none; border: none; cursor: pointer;
    box-shadow: 0 0 36px rgba(255,85,0,0.35);
    transition: transform .2s, box-shadow .2s, background .2s;
    display: inline-block;
  }
  .btn-primary:hover { background: #ff6a1a; transform: translateY(-2px); box-shadow: 0 0 50px rgba(255,85,0,0.5); }
  .btn-secondary {
    background: transparent; color: var(--text);
    padding: 13px 32px; border-radius: 10px;
    font-family: var(--font-body); font-size: 0.925rem; font-weight: 400;
    text-decoration: none; border: 1px solid var(--border);
    cursor: pointer; transition: border-color .2s, background .2s;
    display: inline-block;
  }
  .btn-secondary:hover { border-color: rgba(255,85,0,0.4); background: rgba(255,85,0,0.05); }

  .hero-scroll {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--text-mute); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 5; opacity: 0;
  }
  .scroll-line { width: 1px; height: 40px; background: linear-gradient(var(--orange), transparent); animation: scrollAnim 2s infinite; }
  @keyframes scrollAnim { 0%{opacity:0;transform:scaleY(0);transform-origin:top} 50%{opacity:1} 100%{opacity:0;transform:scaleY(1);transform-origin:bottom} }

  /* ── STATS BAR ─────────────────────────── */
  #stats {
    padding: 0 48px;
    position: relative; z-index: 2;
  }
  .stats-inner {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding: 40px 0;
    gap: 0;
  }
  .stat-item {
    text-align: center;
    border-right: 1px solid var(--border);
    padding: 0 24px;
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-family: var(--font-head);
    font-size: 2.8rem; font-weight: 800; letter-spacing: -0.04em;
    color: var(--orange);
    display: block;
  }
  .stat-label {
    font-size: 0.82rem; color: var(--text-dim); letter-spacing: 0.05em;
    text-transform: uppercase; margin-top: 4px;
  }

  /* ── ABOUT ─────────────────────────────── */
  #about {
    padding: 120px 48px;
  }
  .section-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 20px;
  }
  .section-tag::before { content:''; display:block; width:24px; height:1px; background:var(--orange); }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; max-width: 1200px; margin: 0 auto; }
  .about-text h2 {
    font-family: var(--font-head);
    font-size: clamp(2.2rem, 4vw, 3.5rem);
    font-weight: 800; line-height: 1.1; letter-spacing: -0.03em;
    margin-bottom: 28px;
  }
  .about-text p {
    font-size: 0.975rem; line-height: 1.8; color: var(--text-dim);
    margin-bottom: 20px;
  }
  .about-links { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 36px; }
  .about-link {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.875rem; color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 10px 18px; border-radius: 8px;
    transition: all .2s;
  }
  .about-link:hover { border-color: var(--border-orange); color: var(--orange); background: var(--orange-soft); }
  .about-visual { position: relative; }
  .about-card-main {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .about-card-main::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
  }
  .about-card-main::after {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,85,0,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .about-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), #ff8c42);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-size: 1.8rem; font-weight: 800;
    margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(255,85,0,0.3);
  }
  .about-card-name {
    font-family: var(--font-head); font-size: 1.4rem; font-weight: 700;
    margin-bottom: 6px;
  }
  .about-card-role { font-size: 0.875rem; color: var(--orange); margin-bottom: 28px; }
  .about-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .about-info-item label { font-size: 0.72rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
  .about-info-item span { font-size: 0.875rem; color: var(--text-dim); }
  .about-mini-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .about-mini-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .mini-card-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--orange-soft); display:flex;align-items:center;justify-content:center; font-size: 1rem; flex-shrink: 0; }

  /* ── SKILLS ────────────────────────────── */
  #skills { padding: 120px 48px; }
  .skills-header { text-align: center; max-width: 600px; margin: 0 auto 72px; }
  .skills-header h2 {
    font-family: var(--font-head); font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800; letter-spacing: -0.03em; margin-bottom: 16px;
  }
  .skills-header p { color: var(--text-dim); line-height: 1.7; }
  .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; max-width: 1200px; margin: 0 auto; }
  .skill-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 32px 28px;
    transition: background .3s, border-color .3s, transform .3s;
    position: relative; overflow: hidden;
  }
  .skill-card:first-child { border-radius: 16px 0 0 0; }
  .skill-card:nth-child(3) { border-radius: 0 16px 0 0; }
  .skill-card:nth-child(7) { border-radius: 0 0 0 16px; }
  .skill-card:last-child { border-radius: 0 0 16px 0; }
  .skill-card:hover { background: var(--card2); border-color: var(--border-orange); transform: translateY(-3px); }
  .skill-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at top left, rgba(255,85,0,0.06) 0%, transparent 60%);
    opacity: 0; transition: opacity .3s;
  }
  .skill-card:hover::before { opacity: 1; }
  .skill-icon { font-size: 2rem; margin-bottom: 16px; display: block; }
  .skill-card h3 { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }
  .skill-card p { font-size: 0.83rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-tag {
    font-size: 0.72rem; letter-spacing: 0.04em;
    background: rgba(255,85,0,0.1); color: var(--orange);
    border: 1px solid rgba(255,85,0,0.2);
    padding: 3px 10px; border-radius: 100px;
  }
  .learn-link {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.82rem; color: var(--text-dim);
    text-decoration: none; margin-top: 18px;
    transition: color .2s;
  }
  .learn-link:hover { color: var(--orange); }
  .learn-link svg { transition: transform .2s; }
  .learn-link:hover svg { transform: translateX(4px); }

  /* ── PROJECTS ──────────────────────────── */
  #projects { padding: 120px 48px; background: linear-gradient(180deg, var(--bg) 0%, #0b0b0b 100%); }
  .projects-header { max-width: 1200px; margin: 0 auto 64px; display: flex; align-items: flex-end; justify-content: space-between; }
  .projects-header h2 { font-family: var(--font-head); font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: -0.03em; }
  .projects-header p { color: var(--text-dim); font-size: 0.9rem; max-width: 340px; text-align: right; line-height: 1.6; }
  .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; }
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    position: relative; overflow: hidden;
    transition: border-color .3s, transform .3s;
    display: flex; flex-direction: column;
  }
  .project-card:hover { border-color: var(--border-orange); transform: translateY(-6px); }
  .project-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), #ff8c42);
    transform: scaleX(0); transition: transform .3s; transform-origin: left;
  }
  .project-card:hover::after { transform: scaleX(1); }
  .project-glow {
    position: absolute; top: -40px; right: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(255,85,0,0.12) 0%, transparent 70%);
    pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  .project-card:hover .project-glow { opacity: 1; }
  .project-number {
    font-family: var(--font-head); font-size: 0.72rem; font-weight: 700;
    color: var(--orange); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 20px;
  }
  .project-icon-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .project-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--orange-soft);
    display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    border: 1px solid var(--border-orange);
  }
  .project-card h3 { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; margin-bottom: 12px; }
  .project-card p { font-size: 0.875rem; color: var(--text-dim); line-height: 1.7; flex: 1; margin-bottom: 28px; }
  .project-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .project-tech { display: flex; gap: 6px; flex-wrap: wrap; }
  .project-tech span { font-size: 0.72rem; color: var(--text-mute); border: 1px solid var(--border); border-radius: 100px; padding: 2px 8px; }
  .project-link {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); text-decoration: none; font-size: 1rem;
    transition: all .2s; flex-shrink: 0;
  }
  .project-link:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-soft); }
  .projects-cta { text-align: center; margin-top: 56px; }

  /* ── EXPERIENCE ────────────────────────── */
  #experience { padding: 120px 48px; }
  .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; max-width: 1200px; margin: 0 auto; }
  .exp-col h2 { font-family: var(--font-head); font-size: clamp(1.8rem, 3vw, 2.5rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 44px; }
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 1px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 44px; }
  .timeline-item::before {
    content: ''; position: absolute; left: -32px; top: 6px;
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--orange); background: var(--bg);
  }
  .timeline-item.active::before { background: var(--orange); box-shadow: 0 0 12px var(--orange-glow); }
  .timeline-date { font-size: 0.75rem; color: var(--orange); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .timeline-item h3 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .timeline-org { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 12px; }
  .timeline-desc { font-size: 0.83rem; color: var(--text-mute); line-height: 1.65; }

  /* ── GLOBE SECTION ─────────────────────── */
  #globe-section {
    padding: 0;
    height: 600px; position: relative; overflow: hidden;
  }
  #globe-canvas { position: absolute; inset: 0; }
  .globe-overlay {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, transparent 30%, rgba(8,8,8,0.85) 80%);
  }
  .globe-tag { font-size: 0.8rem; color: var(--orange); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
  .globe-heading { font-family: var(--font-head); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 20px; }
  .globe-sub { font-size: 1rem; color: var(--text-dim); max-width: 500px; line-height: 1.7; }

  /* ── CONTACT ───────────────────────────── */
  #contact { padding: 120px 48px; }
  .contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; align-items: start; }
  .contact-left h2 { font-family: var(--font-head); font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 20px; }
  .contact-left p { font-size: 0.975rem; color: var(--text-dim); line-height: 1.75; margin-bottom: 40px; }
  .contact-items { display: flex; flex-direction: column; gap: 20px; }
  .contact-item {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 22px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    transition: all .2s;
  }
  .contact-item:hover { border-color: var(--border-orange); background: var(--card2); }
